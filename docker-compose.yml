version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-3000}:3000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file: .env
    volumes:
      - scraper-state:/app/state
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # Optional: Caddy reverse proxy for HTTPS
  # Uncomment if you want automatic HTTPS with Let's Encrypt
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     - api
  #     - web
  #   restart: unless-stopped

volumes:
  scraper-state:
